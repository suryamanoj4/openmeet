services:
  db:
    image: postgres:16-alpine
    container_name: openmeet-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - openmeet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openmeet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app:app --host 0.0.0.0 --port 8000 --no-reload"
    networks:
      - openmeet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: openmeet-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PUBLIC_GRAPHQL_URL: ${PUBLIC_GRAPHQL_URL}
    depends_on:
      - backend
    networks:
      - openmeet

  nginx:
    image: nginx:alpine
    container_name: openmeet-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - openmeet

volumes:
  postgres_data:

networks:
  openmeet:
    driver: bridge
