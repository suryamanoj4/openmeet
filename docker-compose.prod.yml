services:
  db:
    image: postgres:16-alpine
    container_name: openmeet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openmeet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmeet_password}
      POSTGRES_DB: openmeet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmeet -d openmeet"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - openmeet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openmeet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://openmeet:${POSTGRES_PASSWORD:-openmeet_password}@db:5432/openmeet
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app:app --host 0.0.0.0 --port 8000 --no-reload"
    networks:
      - openmeet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: openmeet-frontend
    restart: unless-stopped
    environment:
      PUBLIC_GRAPHQL_URL: /graphql
    depends_on:
      - backend
    networks:
      - openmeet

  nginx:
    image: nginx:alpine
    container_name: openmeet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - openmeet

volumes:
  postgres_data:

networks:
  openmeet:
    driver: bridge
