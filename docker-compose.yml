services:
  db:
    image: postgres:16-alpine
    container_name: openmeet-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - openmeet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openmeet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    networks:
      - openmeet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openmeet-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PUBLIC_GRAPHQL_URL: ${PUBLIC_GRAPHQL_URL}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    networks:
      - openmeet

volumes:
  postgres_data:

networks:
  openmeet:
    driver: bridge
