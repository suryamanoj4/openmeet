services:
  db:
    image: postgres:16-alpine
    container_name: openmeet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openmeet
      POSTGRES_PASSWORD: openmeet_password
      POSTGRES_DB: openmeet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmeet -d openmeet"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - openmeet

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openmeet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://openmeet:openmeet_password@db:5432/openmeet
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    networks:
      - openmeet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openmeet-frontend
    restart: unless-stopped
    environment:
      PUBLIC_GRAPHQL_URL: http://localhost:8000/graphql
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    networks:
      - openmeet

volumes:
  postgres_data:

networks:
  openmeet:
    driver: bridge
