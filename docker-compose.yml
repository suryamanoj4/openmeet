services:
  db:
    image: postgres:16-alpine
    container_name: openmeet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openmeet
      POSTGRES_PASSWORD: openmeet_password
      POSTGRES_DB: openmeet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmeet -d openmeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: openmeet-backend
    restart: unless-stopped
    environment:
      # Application
      APP_NAME: OpenMeets
      DEBUG: "false"
      
      # Database
      DATABASE_URL: postgresql+asyncpg://openmeet:openmeet_password@db:5432/openmeet
      
      # JWT
      JWT_SECRET_KEY: change-me-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # Email (optional - configure as needed)
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: 587
      # SMTP_USERNAME: user
      # SMTP_PASSWORD: password
      # FROM_EMAIL: noreply@example.com
      # FROM_NAME: OpenMeets
      
      # SendGrid (optional)
      # SENDGRID_API_KEY: your-sendgrid-api-key
      
      # AWS SES (optional)
      # AWS_ACCESS_KEY_ID: your-aws-key
      # AWS_SECRET_ACCESS_KEY: your-aws-secret
      # AWS_REGION: us-east-1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
